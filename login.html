<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - RENTO</title>
  
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-page">
  
  <div class="auth-container">
    
    <!-- Logo -->
    <a href="index.html" class="auth-logo">
      <div class="logo-icon">
        <i data-lucide="home" style="width:28px;height:28px"></i>
      </div>
      <span class="logo-text">RENTO</span>
    </a>

    <!-- Card -->
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-title">Bienvenido de vuelta</h1>
        <p class="auth-subtitle">Inicia sesión en tu cuenta</p>
      </div>

      <!-- Mensajes -->
      <div id="error-message" class="alert alert-error hidden"></div>

      <!-- Formulario -->
      <form id="login-form">
        <div class="input-group">
          <label for="email" class="input-label">Email</label>
          <div class="input-wrapper">
            <i data-lucide="mail" class="input-icon" style="width:18px;height:18px"></i>
            <input 
              type="email" 
              id="email" 
              name="email"
              class="input-field has-icon"
              placeholder="tu@email.com"
              required
              autocomplete="email"
            >
          </div>
        </div>

        <div class="input-group">
          <label for="password" class="input-label">Contraseña</label>
          <div class="input-wrapper">
            <i data-lucide="lock" class="input-icon" style="width:18px;height:18px"></i>
            <input 
              type="password" 
              id="password" 
              name="password"
              class="input-field has-icon"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            >
          </div>
        </div>

        <button type="submit" id="submit-btn" class="btn btn-primary btn-full">
          <span id="btn-text">Iniciar sesión</span>
          <span id="btn-spinner" class="spinner spinner-small hidden" style="border-color:rgba(255,255,255,0.3);border-top-color:white"></span>
        </button>
      </form>

      <p class="auth-footer">
        ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
      </p>
    </div>

    <a href="index.html" class="auth-link-back">← Volver al inicio</a>

  </div>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script>
    // Si ya está logueado, redirigir
    redirectIfAuthenticated();
    
    // Inicializar iconos
    lucide.createIcons();

    // Manejar formulario
    const form = document.getElementById('login-form');
    const submitBtn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const btnSpinner = document.getElementById('btn-spinner');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError('error-message');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Validación
      if (!isValidEmail(email)) {
        showError('error-message', 'Email inválido');
        return;
      }

      // Loading
      submitBtn.disabled = true;
      btnText.textContent = 'Iniciando sesión...';
      btnSpinner.classList.remove('hidden');

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email,
          password,
        });

        if (error) {
          let msg = 'Error al iniciar sesión';
          if (error.message.includes('Invalid login credentials')) {
            msg = 'Email o contraseña incorrectos';
          } else if (error.message.includes('Email not confirmed')) {
            msg = 'Por favor confirma tu email antes de iniciar sesión';
          } else {
            msg = error.message;
          }
          showError('error-message', msg);
          return;
        }

        // Éxito → ir al dashboard
        window.location.href = 'dashboard.html';

      } catch (err) {
        showError('error-message', 'Error inesperado. Intenta de nuevo.');
        console.error(err);
      } finally {
        submitBtn.disabled = false;
        btnText.textContent = 'Iniciar sesión';
        btnSpinner.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
