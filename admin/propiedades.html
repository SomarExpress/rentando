<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Propiedades - Admin RENTO</title>
  
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  
  <div class="admin-layout">
    <div id="sidebar-slot"></div>
    
    <div class="admin-main">
      <div id="topbar-slot"></div>
      
      <main class="admin-content">
        <div id="page-content">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script>
    let currentAdmin = null;
    let currentTab = 'pending';

    (async function() {
      currentAdmin = await initAdminLayout('propiedades');
      if (!currentAdmin) return;
      
      const params = new URLSearchParams(window.location.search);
      const targetId = params.get('id');
      
      await renderPage();
      
      if (targetId) {
        setTimeout(() => openDetail(targetId), 200);
      }
    })();

    async function renderPage() {
      document.getElementById('page-content').innerHTML = `
        <div class="page-header">
          <h1 class="page-title">Propiedades</h1>
          <p class="page-subtitle">Gestiona y aprueba las propiedades publicadas</p>
        </div>

        <div class="tabs">
          <button class="tab ${currentTab === 'pending' ? 'active' : ''}" onclick="setTab('pending')">Pendientes</button>
          <button class="tab ${currentTab === 'active' ? 'active' : ''}" onclick="setTab('active')">Activas</button>
          <button class="tab ${currentTab === 'rejected' ? 'active' : ''}" onclick="setTab('rejected')">Rechazadas</button>
          <button class="tab ${currentTab === 'paused' ? 'active' : ''}" onclick="setTab('paused')">Pausadas</button>
        </div>

        <div id="list-container">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      `;
      lucide.createIcons();
      await loadList();
    }

    async function loadList() {
      try {
        const { data, error } = await supabaseClient
          .from('properties')
          .select(`
            *,
            owner:profiles!properties_owner_id_fkey(id, full_name, email, verification_status)
          `)
          .eq('status', currentTab)
          .order('created_at', { ascending: false });

        if (error) throw error;

        renderList(data || []);
      } catch (err) {
        document.getElementById('list-container').innerHTML = `
          <div class="alert alert-error">${err.message}</div>
        `;
      }
    }

    function renderList(properties) {
      if (properties.length === 0) {
        document.getElementById('list-container').innerHTML = `
          <div class="card">
            <div class="empty-state">
              <div class="empty-state-icon">
                <i data-lucide="building-2" style="width:32px;height:32px"></i>
              </div>
              <p>No hay propiedades en este estado</p>
            </div>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      document.getElementById('list-container').innerHTML = `
        <div class="card">
          <div class="table-wrapper">
            <table class="table">
              <thead>
                <tr>
                  <th></th>
                  <th>Propiedad</th>
                  <th>Dueño</th>
                  <th>Ubicación</th>
                  <th>Precio</th>
                  <th>Fecha</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                ${properties.map(p => {
                  const cover = p.images && p.images[p.cover_image_index || 0];
                  const ownerVerified = p.owner?.verification_status === 'verified';
                  return `
                    <tr>
                      <td style="width:80px">
                        ${cover ? `
                          <img src="${cover}" style="width:60px;height:60px;object-fit:cover;border-radius:8px" alt="">
                        ` : `
                          <div style="width:60px;height:60px;background:var(--bg-light);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-light)">
                            <i data-lucide="image-off" style="width:24px;height:24px"></i>
                          </div>
                        `}
                      </td>
                      <td>
                        <div style="font-weight:600;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.title}</div>
                        <div style="color:var(--text-light);font-size:0.8125rem">${PROPERTY_TYPE_NAMES[p.property_type]} · ${p.bedrooms} hab</div>
                      </td>
                      <td>
                        <div style="font-weight:500;font-size:0.875rem">${p.owner?.full_name || 'N/A'}</div>
                        ${ownerVerified ? '<span class="badge badge-verified" style="margin-top:2px"><i data-lucide="check" style="width:10px;height:10px"></i>Verificado</span>' : '<span class="badge badge-pending">Sin verificar</span>'}
                      </td>
                      <td style="color:var(--text-medium);font-size:0.875rem">${p.neighborhood}, ${CITY_NAMES[p.city]}</td>
                      <td style="font-weight:600;color:var(--primary)">${formatPrice(p.price_lempiras)}</td>
                      <td style="color:var(--text-medium);font-size:0.875rem">${timeAgo(p.created_at)}</td>
                      <td>
                        <button onclick="openDetail('${p.id}')" class="btn btn-primary btn-sm">
                          ${currentTab === 'pending' ? 'Revisar' : 'Ver'}
                        </button>
                      </td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
      lucide.createIcons();
    }

    async function setTab(tab) {
      currentTab = tab;
      await renderPage();
    }

    async function openDetail(propertyId) {
      const { data: property, error } = await supabaseClient
        .from('properties')
        .select(`
          *,
          owner:profiles!properties_owner_id_fkey(id, full_name, email, phone, verification_status)
        `)
        .eq('id', propertyId)
        .single();

      if (error || !property) {
        showToast('Error al cargar propiedad', 'error');
        return;
      }

      const ownershipUrl = property.ownership_document_url ? await getSignedUrl(property.ownership_document_url) : null;
      const isPdf = ownershipUrl && property.ownership_document_url.toLowerCase().endsWith('.pdf');

      const modal = document.createElement('div');
      modal.id = 'detail-modal';
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal-content" onclick="event.stopPropagation()" style="max-width:900px">
          <div class="modal-header">
            <div class="modal-title">${property.title}</div>
            <button class="modal-close" onclick="closeDetail()">
              <i data-lucide="x" style="width:20px;height:20px"></i>
            </button>
          </div>
          
          <div class="modal-body">
            
            <!-- Status -->
            <div style="margin-bottom:1rem">
              <span class="badge badge-${property.status}" style="font-size:0.875rem;padding:0.375rem 0.875rem">
                ${property.status.toUpperCase()}
              </span>
              ${property.is_verified ? '<span class="badge badge-verified" style="margin-left:0.5rem"><i data-lucide="check" style="width:10px;height:10px"></i>Verificada</span>' : ''}
            </div>

            <!-- Imágenes -->
            ${property.images && property.images.length > 0 ? `
              <div class="doc-grid" style="margin-bottom:1.5rem">
                ${property.images.map((img, idx) => `
                  <div class="doc-item">
                    <img src="${img}" class="doc-image" alt="Foto ${idx + 1}" onclick="window.open('${img}','_blank')">
                    <div class="doc-label">Foto ${idx + 1}${idx === (property.cover_image_index || 0) ? ' (Portada)' : ''}</div>
                  </div>
                `).join('')}
              </div>
            ` : '<div class="alert alert-warning">Esta propiedad no tiene imágenes</div>'}

            <!-- Info de la propiedad -->
            <div style="background:var(--bg-light);border-radius:8px;padding:1rem;margin-bottom:1.5rem">
              <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem">
                <div>
                  <div style="color:var(--text-light);font-size:0.75rem;text-transform:uppercase;font-weight:600;margin-bottom:0.25rem">Tipo</div>
                  <div style="font-weight:500">${PROPERTY_TYPE_NAMES[property.property_type]}</div>
                </div>
                <div>
                  <div style="color:var(--text-light);font-size:0.75rem;text-transform:uppercase;font-weight:600;margin-bottom:0.25rem">Ciudad</div>
                  <div style="font-weight:500">${CITY_NAMES[property.city]}</div>
                </div>
                <div>
                  <div style="color:var(--text-light);font-size:0.75rem;text-transform:uppercase;font-weight:600;margin-bottom:0.25rem">Habitaciones</div>
                  <div style="font-weight:500">${property.bedrooms}</div>
                </div>
                <div>
                  <div style="color:var(--text-light);font-size:0.75rem;text-transform:uppercase;font-weight:600;margin-bottom:0.25rem">Baños</div>
                  <div style="font-weight:500">${property.bathrooms}</div>
                </div>
                <div>
                  <div style="color:var(--text-light);font-size:0.75rem;text-transform:uppercase;font-weight:600;margin-bottom:0.25rem">Precio</div>
                  <div style="font-weight:700;color:var(--primary)">${formatPrice(property.price_lempiras)}/mes</div>
                </div>
                <div>
                  <div style="color:var(--text-light);font-size:0.75rem;text-transform:uppercase;font-weight:600;margin-bottom:0.25rem">Depósito</div>
                  <div style="font-weight:500">${property.deposit_amount > 0 ? formatPrice(property.deposit_amount) : 'Sin depósito'}</div>
                </div>
                ${property.area_m2 ? `
                  <div>
                    <div style="color:var(--text-light);font-size:0.75rem;text-transform:uppercase;font-weight:600;margin-bottom:0.25rem">Área</div>
                    <div style="font-weight:500">${property.area_m2} m²</div>
                  </div>
                ` : ''}
                <div>
                  <div style="color:var(--text-light);font-size:0.75rem;text-transform:uppercase;font-weight:600;margin-bottom:0.25rem">Mín. meses</div>
                  <div style="font-weight:500">${property.minimum_months}</div>
                </div>
              </div>
            </div>

            <!-- Dirección -->
            <h3 style="font-weight:700;margin-bottom:0.5rem;font-size:1rem">Ubicación</h3>
            <div style="background:var(--bg-light);border-radius:8px;padding:1rem;margin-bottom:1.5rem">
              <div style="margin-bottom:0.5rem"><strong>Colonia:</strong> ${property.neighborhood}</div>
              <div style="margin-bottom:0.5rem"><strong>Dirección:</strong> ${property.address}</div>
              ${property.reference_point ? `<div><strong>Referencia:</strong> ${property.reference_point}</div>` : ''}
            </div>

            <!-- Descripción -->
            <h3 style="font-weight:700;margin-bottom:0.5rem;font-size:1rem">Descripción</h3>
            <div style="background:var(--bg-light);border-radius:8px;padding:1rem;margin-bottom:1.5rem;white-space:pre-line">${property.description}</div>

            <!-- Amenidades -->
            ${property.amenities && property.amenities.length > 0 ? `
              <h3 style="font-weight:700;margin-bottom:0.5rem;font-size:1rem">Amenidades</h3>
              <div style="display:flex;flex-wrap:wrap;gap:0.375rem;margin-bottom:1.5rem">
                ${property.amenities.map(a => `<span class="badge badge-active">${a}</span>`).join('')}
              </div>
            ` : ''}

            <!-- Documento de propiedad -->
            ${ownershipUrl ? `
              <h3 style="font-weight:700;margin-bottom:0.5rem;font-size:1rem">Documento de propiedad</h3>
              <div class="doc-grid" style="margin-bottom:1.5rem">
                ${isPdf ? `
                  <div class="doc-item">
                    <div style="aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;background:var(--primary-50);color:var(--primary);cursor:pointer" onclick="window.open('${ownershipUrl}','_blank')">
                      <div style="text-align:center">
                        <i data-lucide="file-text" style="width:48px;height:48px"></i>
                        <div style="font-size:0.8125rem;margin-top:0.5rem;font-weight:600">Click para abrir PDF</div>
                      </div>
                    </div>
                    <div class="doc-label">Documento</div>
                  </div>
                ` : `
                  <div class="doc-item">
                    <img src="${ownershipUrl}" class="doc-image" onclick="window.open('${ownershipUrl}','_blank')">
                    <div class="doc-label">Documento de propiedad</div>
                  </div>
                `}
              </div>
            ` : '<div class="alert alert-warning" style="margin-bottom:1.5rem">El dueño no subió documento de propiedad</div>'}

            <!-- Info del dueño -->
            <h3 style="font-weight:700;margin-bottom:0.5rem;font-size:1rem">Dueño</h3>
            <div style="background:var(--bg-light);border-radius:8px;padding:1rem;margin-bottom:1.5rem">
              <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem">
                <div>
                  <div style="color:var(--text-light);font-size:0.75rem;text-transform:uppercase;font-weight:600;margin-bottom:0.25rem">Nombre</div>
                  <div style="font-weight:500">${property.owner?.full_name || 'N/A'}</div>
                </div>
                <div>
                  <div style="color:var(--text-light);font-size:0.75rem;text-transform:uppercase;font-weight:600;margin-bottom:0.25rem">Email</div>
                  <div style="font-weight:500">${property.owner?.email || '—'}</div>
                </div>
                <div>
                  <div style="color:var(--text-light);font-size:0.75rem;text-transform:uppercase;font-weight:600;margin-bottom:0.25rem">Teléfono</div>
                  <div style="font-weight:500">${property.owner?.phone || '—'}</div>
                </div>
                <div>
                  <div style="color:var(--text-light);font-size:0.75rem;text-transform:uppercase;font-weight:600;margin-bottom:0.25rem">Verificación</div>
                  <div><span class="badge badge-${property.owner?.verification_status === 'verified' ? 'verified' : 'pending'}">${property.owner?.verification_status === 'verified' ? 'Verificado' : 'Sin verificar'}</span></div>
                </div>
              </div>
            </div>

            ${property.rejection_reason ? `
              <div class="alert alert-error">
                <i data-lucide="x-circle" style="width:18px;height:18px;flex-shrink:0;margin-top:2px"></i>
                <div><strong>Razón del rechazo anterior:</strong> ${property.rejection_reason}</div>
              </div>
            ` : ''}

            ${property.status === 'pending' ? `
              <div style="margin-top:1rem">
                <h3 style="font-weight:700;margin-bottom:0.5rem;font-size:1rem">Decisión</h3>
                <div class="input-group">
                  <label class="input-label">Notas (si rechazas, será visible al dueño)</label>
                  <textarea id="admin-notes" class="input-field" rows="3" placeholder="Ej: Las fotos no son claras, faltan detalles, dirección incompleta..."></textarea>
                </div>
              </div>
            ` : ''}
          </div>

          <div class="modal-footer">
            <button onclick="closeDetail()" class="btn btn-outline">Cerrar</button>
            ${property.status === 'pending' ? `
              <button onclick="rejectProperty('${property.id}')" class="btn btn-danger">
                <i data-lucide="x-circle" style="width:16px;height:16px"></i>
                Rechazar
              </button>
              <button onclick="approveProperty('${property.id}')" class="btn btn-success">
                <i data-lucide="check-circle-2" style="width:16px;height:16px"></i>
                Aprobar y publicar
              </button>
            ` : ''}
            ${property.status === 'active' ? `
              <button onclick="deactivateProperty('${property.id}')" class="btn btn-danger">
                <i data-lucide="archive" style="width:16px;height:16px"></i>
                Desactivar
              </button>
            ` : ''}
          </div>
        </div>
      `;

      modal.addEventListener('click', closeDetail);
      document.body.appendChild(modal);
      lucide.createIcons();
    }

    function closeDetail() {
      const modal = document.getElementById('detail-modal');
      if (modal) modal.remove();
    }

    async function approveProperty(propertyId) {
      if (!confirm('¿Aprobar y publicar esta propiedad?')) return;

      const notes = document.getElementById('admin-notes')?.value.trim() || null;

      try {
        const now = new Date().toISOString();
        const { error } = await supabaseClient
          .from('properties')
          .update({
            status: 'active',
            is_verified: true,
            verified_at: now,
            verified_by: currentAdmin.profile.id,
            published_at: now,
            rejection_reason: null,
          })
          .eq('id', propertyId);

        if (error) throw error;

        await logAdminAction(currentAdmin.profile.id, 'approve_property', 'property', propertyId, { notes });

        showToast('Propiedad aprobada y publicada');
        closeDetail();
        await loadList();
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      }
    }

    async function rejectProperty(propertyId) {
      const notes = document.getElementById('admin-notes')?.value.trim();
      
      if (!notes) {
        alert('Por favor escribe una razón para el rechazo (visible al dueño)');
        return;
      }

      if (!confirm('¿Rechazar esta propiedad?')) return;

      try {
        const { error } = await supabaseClient
          .from('properties')
          .update({
            status: 'rejected',
            rejection_reason: notes,
            verified_by: currentAdmin.profile.id,
          })
          .eq('id', propertyId);

        if (error) throw error;

        await logAdminAction(currentAdmin.profile.id, 'reject_property', 'property', propertyId, { notes });

        showToast('Propiedad rechazada');
        closeDetail();
        await loadList();
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      }
    }

    async function deactivateProperty(propertyId) {
      if (!confirm('¿Desactivar esta propiedad? Dejará de aparecer en búsquedas pero el dueño puede reactivarla.')) return;

      try {
        const { error } = await supabaseClient
          .from('properties')
          .update({ status: 'paused' })
          .eq('id', propertyId);

        if (error) throw error;
        showToast('Propiedad desactivada');
        closeDetail();
        await loadList();
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      }
    }

    // Globales
    window.toggleSidebar = toggleSidebar;
    window.adminSignOut = adminSignOut;
    window.setTab = setTab;
    window.openDetail = openDetail;
    window.closeDetail = closeDetail;
    window.approveProperty = approveProperty;
    window.rejectProperty = rejectProperty;
    window.deactivateProperty = deactivateProperty;
  </script>
</body>
</html>
